<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Champs Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
  <script>
    const API_BASE = localStorage.getItem('cc_api_base') || 'http://localhost:3000';
    const merchantId = localStorage.getItem('cc_merchant_id') || 'demo_merchant';
    const sessionId = localStorage.getItem('cc_session_id') || (function() {
      const id = 'sess_' + Math.random().toString(36).slice(2, 10);
      localStorage.setItem('cc_session_id', id);
      return id;
    })();

    async function logEvent(eventType, metadata = {}) {
      try {
        await fetch(API_BASE + '/api/events/log', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            merchant_id: merchantId,
            session_id: sessionId,
            event_type: eventType,
            page: 'demo',
            metadata
          })
        });
      } catch (err) {
        console.warn('Logging unavailable:', err.message);
      }
    }

    logEvent('demo_opened');

    document.addEventListener('click', (e) => {
      const game = e.target.closest('[data-game]')?.getAttribute('data-game');
      const action = e.target.closest('[data-action]')?.getAttribute('data-action');
      const tttIndex = e.target.closest('[data-ttt-index]')?.getAttribute('data-ttt-index');

      if (game) logEvent('game_selected', { game });
      if (action) logEvent('demo_action', { action });
      if (tttIndex !== null && tttIndex !== undefined) logEvent('ttt_move', { index: Number(tttIndex) });
    }, true);

    window.addEventListener('beforeunload', () => {
      navigator.sendBeacon?.(API_BASE + '/api/events/log', new Blob([JSON.stringify({
        merchant_id: merchantId,
        session_id: sessionId,
        event_type: 'demo_exit',
        page: 'demo',
        metadata: { discount: localStorage.getItem('cc_discount') || 0 }
      })], { type: 'application/json' }));
    });
  </script>
</body>
</html>
