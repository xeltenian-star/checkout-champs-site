<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Champs Admin</title>
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#0f172a; color:white; }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
    h1 { margin:0 0 10px; font-size: 42px; }
    .muted { color: rgba(255,255,255,0.72); }
    .row { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; margin: 24px 0; }
    .card { border:1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); border-radius: 22px; padding: 20px; }
    .card strong { display:block; font-size: 32px; color:#fbbf24; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding: 12px 10px; border-bottom:1px solid rgba(255,255,255,0.08); font-size: 14px; vertical-align: top; }
    th { color:#fbbf24; }
    .panel { border:1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); border-radius: 26px; padding: 20px; margin-top:20px; overflow:auto; }
    .top { display:flex; justify-content:space-between; align-items:center; gap: 16px; flex-wrap: wrap; }
    button, input { font: inherit; }
    button { background:#fbbf24; color:#111827; border:none; border-radius: 14px; padding: 12px 16px; font-weight: 800; cursor: pointer; }
    input { background:#111827; color:white; border:1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 12px 14px; min-width: 260px; }
    @media (max-width: 960px) { .row { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Checkout Champs Admin</h1>
        <div class="muted">Private view for merchants, settings, and raw event logs.</div>
      </div>
      <div>
        <input id="apiBase" placeholder="API base e.g. http://localhost:3000" />
        <button id="refreshBtn">Refresh</button>
      </div>
    </div>

    <div class="row">
      <div class="card"><div class="muted">Total Merchants</div><strong id="totalMerchants">0</strong></div>
      <div class="card"><div class="muted">Active Subscribers</div><strong id="activeMerchants">0</strong></div>
      <div class="card"><div class="muted">Logged Events</div><strong id="totalEvents">0</strong></div>
      <div class="card"><div class="muted">Recent Demo Opens</div><strong id="demoOpens">0</strong></div>
    </div>

    <div class="panel">
      <h2>Merchants</h2>
      <table id="merchantsTable">
        <thead><tr><th>ID</th><th>Business</th><th>Email</th><th>Platform</th><th>Niche</th><th>Plan</th><th>Status</th><th>Created</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Recent Events</h2>
      <table id="eventsTable">
        <thead><tr><th>Time</th><th>Merchant</th><th>Session</th><th>Type</th><th>Page</th><th>Metadata</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script>
    const apiInput = document.getElementById('apiBase');
    apiInput.value = localStorage.getItem('cc_api_base') || 'http://localhost:3000';
    document.getElementById('refreshBtn').addEventListener('click', load);

    function fmt(value) {
      if (!value) return '';
      try { return new Date(value).toLocaleString(); } catch { return value; }
    }

    async function load() {
      const apiBase = apiInput.value.trim();
      localStorage.setItem('cc_api_base', apiBase);
      const merchantsRes = await fetch(apiBase + '/api/admin/merchants');
      const merchantsData = await merchantsRes.json();
      const eventsRes = await fetch(apiBase + '/api/admin/events?limit=200');
      const eventsData = await eventsRes.json();

      const merchants = merchantsData.merchants || [];
      const events = eventsData.events || [];
      document.getElementById('totalMerchants').textContent = merchants.length;
      document.getElementById('activeMerchants').textContent = merchants.filter(m => m.status === 'active').length;
      document.getElementById('totalEvents').textContent = events.length;
      document.getElementById('demoOpens').textContent = events.filter(e => e.event_type === 'demo_opened').length;

      document.querySelector('#merchantsTable tbody').innerHTML = merchants.map(m => `
        <tr>
          <td>${m.id}</td>
          <td>${m.business_name || ''}</td>
          <td>${m.email || ''}</td>
          <td>${m.platform || ''}</td>
          <td>${m.niche || ''}</td>
          <td>${m.plan || ''}</td>
          <td>${m.status || ''}</td>
          <td>${fmt(m.created_at)}</td>
        </tr>
      `).join('');

      document.querySelector('#eventsTable tbody').innerHTML = events.map(e => `
        <tr>
          <td>${fmt(e.created_at)}</td>
          <td>${e.merchant_id || ''}</td>
          <td>${e.session_id || ''}</td>
          <td>${e.event_type || ''}</td>
          <td>${e.page || ''}</td>
          <td><pre style="white-space:pre-wrap; margin:0; color:#cbd5e1;">${JSON.stringify(JSON.parse(e.metadata_json || '{}'), null, 2)}</pre></td>
        </tr>
      `).join('');
    }

    load().catch(err => alert('Could not load admin data yet: ' + err.message));
  </script>
</body>
</html>
